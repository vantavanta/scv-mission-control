<html lang="en">
<head>

<meta name="generator" content="Perplexity Computer">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCV Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --card: #141414;
  --border: #222;
  --text-primary: #e8e8e8;
  --text-secondary: #888;
  --text-muted: #555;
  --green: #22c55e;
  --teal: #4f98a3;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #a78bfa;
  --blue: #3b82f6;
  --indigo: #6366f1;
  --font-mono: 'JetBrains Mono', monospace;
  --font-ui: 'Inter', sans-serif;
  --header-h: 52px;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* === LAYOUT === */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
#header {
  height: var(--header-h);
  min-height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
#main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 20px 40px;
}
#main::-webkit-scrollbar { width: 6px; }
#main::-webkit-scrollbar-track { background: transparent; }
#main::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* === HEADER === */
.header-left { display: flex; flex-direction: column; justify-content: center; gap: 0; }
.header-title {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.5px;
}
.header-bankroll {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: -1px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
}
.conn-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}
.conn-dot.error { background: var(--red); }

/* === SECTION === */
.section { margin-bottom: 20px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-secondary);
}
.count-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  background: #1e1e1e;
  color: var(--text-secondary);
  padding: 1px 7px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

/* === AGENT STRIP === */
.agent-strip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.agent-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.agent-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.agent-dot.active { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.agent-dot.idle { background: var(--text-muted); }
.agent-dot.error { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
.agent-status-text {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.agent-middle {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  flex: 1;
  text-align: center;
  min-width: 120px;
}
.agent-right {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}

/* === CURRENT FOCUS === */
.focus-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--teal);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.focus-card.focus-active { border-left-color: var(--green); }
.focus-card.focus-idle { border-left-color: var(--text-muted); }
.focus-label {
  font-family: var(--font-ui);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.focus-project {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}
.focus-project .focus-status-pill {
  font-size: 9px;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 8px;
  vertical-align: middle;
}
.focus-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}
.focus-task {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  flex: 1;
  min-width: 150px;
}
.focus-task-label {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 2px;
  font-family: var(--font-ui);
}
.focus-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
  text-align: right;
}
@media (max-width: 700px) {
  .focus-card { flex-direction: column; align-items: flex-start; gap: 8px; }
  .focus-divider { width: 100%; height: 1px; }
  .focus-meta { text-align: left; }
}

/* === GRID === */
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

/* === PROJECT CARD === */
.project-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color 0.15s;
}
.project-card:hover { border-color: #333; }
.project-card.live-border { border-left: 2px solid rgba(34,197,94,0.3); }
.project-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.project-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.status-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
}
.badge-live { background: rgba(34,197,94,0.12); color: var(--green); }
.badge-in_progress { background: rgba(245,158,11,0.12); color: var(--amber); }
.badge-planned { background: rgba(167,139,250,0.12); color: var(--purple); }
.badge-paused { background: rgba(136,136,136,0.12); color: var(--text-secondary); }

.type-pill {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 6px;
  border-radius: 3px;
  background: #1a1a1a;
  color: var(--text-muted);
  border: 1px solid #2a2a2a;
  display: inline-block;
  width: fit-content;
}
.project-phase {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-next {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  opacity: 0.8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  margin-top: 2px;
  flex-wrap: wrap;
}
.infra-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.infra-pill {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(79,152,163,0.1);
  color: var(--teal);
  border: 1px solid rgba(79,152,163,0.2);
}
.time-ago {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.gh-link {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 12px;
  flex-shrink: 0;
  transition: color 0.15s;
}
.gh-link:hover { color: var(--text-primary); }
.health-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.health-dot.healthy { background: var(--green); }
.health-dot.warning { background: var(--amber); }
.health-dot.critical { background: var(--red); }

/* === INFRA CARD === */
.infra-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.infra-card:hover { border-color: #333; }
.infra-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.infra-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
}
.infra-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}
.health-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
}
.health-healthy { background: rgba(34,197,94,0.12); color: var(--green); }
.health-warning { background: rgba(245,158,11,0.12); color: var(--amber); }
.health-critical { background: rgba(239,68,68,0.12); color: var(--red); }
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
}
.metric-item {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
  gap: 4px;
}
.metric-label { color: var(--text-muted); }
.metric-value { font-weight: 500; }
.metric-value.good { color: var(--green); }
.metric-value.warn { color: var(--amber); }
.metric-value.bad { color: var(--red); }
.cities-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.city-pill {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(79,152,163,0.08);
  color: var(--teal);
  border: 1px solid rgba(79,152,163,0.15);
}
.infra-projects {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}
.infra-projects a {
  color: var(--teal);
  text-decoration: none;
}
.infra-projects a:hover { text-decoration: underline; }

/* === WORK TRACKER === */
.work-columns {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.work-column {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 100px;
}
.work-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.work-item {
  background: #1a1a1a;
  border: 1px solid #252525;
  border-radius: 6px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.work-item.done-item { opacity: 0.55; }
.work-desc {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-primary);
  line-height: 1.45;
}
.work-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.work-pill {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
}
.pill-project {
  background: rgba(79,152,163,0.1);
  color: var(--teal);
  border: 1px solid rgba(79,152,163,0.2);
}
.pill-scv {
  background: rgba(79,152,163,0.1);
  color: var(--teal);
  border: 1px solid rgba(79,152,163,0.2);
}
.pill-zach {
  background: rgba(245,158,11,0.1);
  color: var(--amber);
  border: 1px solid rgba(245,158,11,0.2);
}
.pill-perplexity {
  background: rgba(167,139,250,0.1);
  color: var(--purple);
  border: 1px solid rgba(167,139,250,0.2);
}
.work-date {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
}

/* === CRON TABLE === */
.cron-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
}
.cron-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 11px;
}
.cron-table th {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.cron-table td {
  padding: 7px 12px;
  border-bottom: 1px solid #1a1a1a;
  color: var(--text-secondary);
  white-space: nowrap;
}
.cron-table tr:last-child td { border-bottom: none; }
.cron-status-ok { color: var(--green); }
.cron-status-error { color: var(--red); }
.cron-name { color: var(--blue); font-weight: 500; }

/* === ACTIVITY LOG === */
.log-filters {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.log-filter-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.log-filter-btn:hover { border-color: #444; color: var(--text-secondary); }
.log-filter-btn.active {
  background: rgba(79,152,163,0.1);
  border-color: rgba(79,152,163,0.3);
  color: var(--teal);
}
.log-container {
  max-height: 450px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
}
.log-container::-webkit-scrollbar { width: 5px; }
.log-container::-webkit-scrollbar-track { background: transparent; }
.log-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
.log-entry {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid #1a1a1a;
  font-family: var(--font-mono);
  font-size: 11px;
}
.log-entry:last-child { border-bottom: none; }
.log-time {
  color: var(--text-muted);
  flex-shrink: 0;
  min-width: 60px;
  font-size: 10px;
}
.log-type-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.log-type-heartbeat { background: var(--teal); }
.log-type-cron { background: var(--blue); }
.log-type-alert { background: var(--amber); }
.log-type-user_message { background: var(--purple); }
.log-type-tool_call { background: var(--indigo); }
.log-project-tag {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: #1e1e1e;
  color: var(--text-muted);
  border: 1px solid #2a2a2a;
  flex-shrink: 0;
  white-space: nowrap;
}
.log-msg {
  color: var(--text-secondary);
  flex: 1;
  line-height: 1.4;
  word-break: break-word;
}
.log-msg.severity-warning { color: var(--amber); }

/* === FOOTER === */
.footer {
  text-align: center;
  padding: 24px 0 8px;
  font-family: var(--font-ui);
  font-size: 11px;
}
.footer a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.15s;
}
.footer a:hover { color: var(--text-secondary); }

/* === RESPONSIVE === */
@media (max-width: 1100px) {
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
  .work-columns { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 700px) {
  #header { padding: 0 12px; }
  #main { padding: 12px; }
  .grid-3 { grid-template-columns: 1fr; }
  .work-columns { grid-template-columns: 1fr; }
  .agent-strip { flex-direction: column; align-items: flex-start; gap: 6px; }
  .agent-middle { text-align: left; }
  .log-entry { flex-wrap: wrap; gap: 4px; }
  .log-time { min-width: unset; }
  .header-title { font-size: 12px; letter-spacing: 0; }
  .header-right { gap: 6px; font-size: 10px; }
  .header-bankroll { font-size: 10px; }
  .log-filter-btn { padding: 3px 7px; font-size: 9px; }
}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="header-left">
      <div class="header-title">🦾 SCV MISSION CONTROL</div>
      <div class="header-bankroll" id="bankrollDisplay">Bankroll: —</div>
    </div>
    <div class="header-right">
      <span id="clockDisplay">--:--:-- CT</span>
      <span class="conn-dot" id="connDot"></span>
      <span id="connLabel">Connected</span>
    </div>
  </div>

  <!-- MAIN SCROLL AREA -->
  <div id="main">
    <!-- Agent Status Strip -->
    <div class="agent-strip" id="agentStrip">
      <div class="agent-left">
        <div class="agent-dot idle" id="agentDot"></div>
        <span class="agent-status-text" id="agentStatusText">—</span>
      </div>
      <div class="agent-middle" id="agentMiddle">—</div>
      <div class="agent-right" id="agentRight">—</div>
    </div>

    <!-- Current Focus -->
    <div id="focusSection"></div>

    <!-- Projects -->
    <div class="section">
      <div class="section-header">Projects <span class="count-badge" id="projectCount">0</span></div>
      <div class="grid-3" id="projectsGrid"></div>
    </div>

    <!-- Infrastructure -->
    <div class="section">
      <div class="section-header">Infrastructure <span class="count-badge" id="infraCount">0</span></div>
      <div class="grid-3" id="infraGrid"></div>
    </div>

    <!-- Work Tracker -->
    <div class="section">
      <div class="section-header">Work Tracker</div>
      <div class="work-columns" id="workColumns"></div>
    </div>

    <!-- Cron Jobs -->
    <div class="section">
      <div class="section-header">Cron Jobs <span class="count-badge" id="cronCount">0</span></div>
      <div class="cron-wrap">
        <table class="cron-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Project</th>
              <th>Schedule</th>
              <th>Last Run</th>
              <th>Status</th>
              <th>Next Run</th>
            </tr>
          </thead>
          <tbody id="cronBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="section">
      <div class="section-header">Activity Log</div>
      <div class="log-filters" id="logFilters"></div>
      <div class="log-container" id="logContainer"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // State
  let data = null;
  let failCount = 0;
  let activeFilter = 'all';

  // === HELPERS ===
  function timeAgo(dateStr) {
    if (!dateStr) return '—';
    const now = new Date();
    const then = new Date(dateStr);
    const diff = Math.max(0, now - then);
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function formatCT(date) {
    return date.toLocaleTimeString('en-US', {
      timeZone: 'America/Chicago',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    }) + ' CT';
  }

  function formatDateCT(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    return d.toLocaleString('en-US', {
      timeZone: 'America/Chicago',
      month: 'short',
      day: 'numeric',
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    });
  }

  function formatTimeCT(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-US', {
      timeZone: 'America/Chicago',
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    });
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function projectNameById(id) {
    if (!data || !data.projects) return id;
    const p = data.projects.find(p => p.id === id);
    return p ? p.name : id;
  }

  // === CLOCK ===
  function updateClock() {
    document.getElementById('clockDisplay').textContent = formatCT(new Date());
  }
  setInterval(updateClock, 1000);
  updateClock();

  // === FETCH ===
  async function fetchData() {
    try {
      const resp = await fetch('scv-status.json?_=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      data = await resp.json();
      failCount = 0;
      render();
    } catch (e) {
      failCount++;
    }
    updateConnection();
  }

  function updateConnection() {
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    if (failCount >= 3) {
      dot.classList.add('error');
      label.textContent = 'Disconnected';
    } else {
      dot.classList.remove('error');
      label.textContent = 'Connected';
    }
  }

  // === RENDER ===
  function render() {
    if (!data) return;
    renderBankroll();
    renderAgent();
    renderFocus();
    renderProjects();
    renderInfra();
    renderWork();
    renderCron();
    renderLogFilters();
    renderLog();
  }

  function renderBankroll() {
    let total = 0;
    if (data.infrastructure) {
      data.infrastructure.forEach(i => {
        if (i.metrics && i.metrics.bankroll_usd) total += i.metrics.bankroll_usd;
      });
    }
    document.getElementById('bankrollDisplay').textContent =
      'Bankroll: $' + total.toLocaleString();
  }

  function renderAgent() {
    const a = data.agent;
    if (!a) return;
    const dot = document.getElementById('agentDot');
    const statusText = document.getElementById('agentStatusText');
    const middle = document.getElementById('agentMiddle');
    const right = document.getElementById('agentRight');

    dot.className = 'agent-dot ' + (a.status || 'idle');
    statusText.textContent = (a.status || 'idle').toUpperCase();
    statusText.style.color = a.status === 'active' ? 'var(--green)' : a.status === 'error' ? 'var(--red)' : 'var(--text-muted)';

    if (a.current_task) {
      middle.textContent = a.current_task;
      middle.style.color = 'var(--text-secondary)';
    } else {
      middle.textContent = 'Idle since ' + timeAgo(a.last_activity);
      middle.style.color = 'var(--text-muted)';
    }

    right.innerHTML = '<span>' + esc(a.model || '—') + '</span><span style="color:var(--text-muted)">|</span><span>' + esc(a.session_id || '—') + '</span>';
  }

  function renderFocus() {
    const container = document.getElementById('focusSection');
    const agent = data.agent || {};
    const currentProjId = agent.current_project;
    const isActive = agent.status === 'active';
    const isError = agent.status === 'error';

    // Find the project
    let proj = null;
    if (currentProjId && data.projects) {
      proj = data.projects.find(p => p.id === currentProjId);
    }

    // Determine task label
    const taskLabel = isActive ? 'CURRENT TASK' : 'LAST KNOWN TASK';
    const taskText = agent.current_task || agent.last_task || 'No task recorded';
    const focusClass = isActive ? 'focus-active' : isError ? 'focus-idle' : 'focus-idle';

    if (proj) {
      // We have a project to show
      const badgeClass = 'badge-' + (proj.status || 'planned');
      const statusLabel = (proj.status || 'planned').replace('_', ' ').toUpperCase();
      container.innerHTML =
        '<div class="focus-card ' + focusClass + '">' +
          '<div>' +
            '<div class="focus-label">CURRENT PROJECT</div>' +
            '<div class="focus-project">' + esc(proj.name) +
              '<span class="focus-status-pill status-badge ' + badgeClass + '">' + statusLabel + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="focus-divider"></div>' +
          '<div class="focus-task" style="flex:1">' +
            '<div class="focus-task-label">' + taskLabel + '</div>' +
            '<div>' + esc(taskText) + '</div>' +
          '</div>' +
          '<div class="focus-meta">' +
            '<div>' + (isActive ? '⚡ Active now' : '💤 Idle ' + timeAgo(agent.last_activity)) + '</div>' +
            (proj.next_action ? '<div style="margin-top:2px;color:var(--text-muted)">Next: ' + esc(proj.next_action) + '</div>' : '') +
          '</div>' +
        '</div>';
    } else if (agent.current_task) {
      // No specific project but has a task
      container.innerHTML =
        '<div class="focus-card ' + focusClass + '">' +
          '<div>' +
            '<div class="focus-label">CURRENT FOCUS</div>' +
            '<div class="focus-project">General</div>' +
          '</div>' +
          '<div class="focus-divider"></div>' +
          '<div class="focus-task" style="flex:1">' +
            '<div class="focus-task-label">' + taskLabel + '</div>' +
            '<div>' + esc(taskText) + '</div>' +
          '</div>' +
          '<div class="focus-meta">' +
            '<div>' + (isActive ? '⚡ Active now' : '💤 Idle ' + timeAgo(agent.last_activity)) + '</div>' +
          '</div>' +
        '</div>';
    } else {
      // Idle with no task
      container.innerHTML =
        '<div class="focus-card focus-idle">' +
          '<div>' +
            '<div class="focus-label">CURRENT FOCUS</div>' +
            '<div class="focus-project" style="color:var(--text-muted)">No active project</div>' +
          '</div>' +
          '<div class="focus-divider"></div>' +
          '<div class="focus-task" style="flex:1;color:var(--text-muted)">' +
            '<div class="focus-task-label">LAST KNOWN TASK</div>' +
            '<div>' + esc(agent.last_task || 'None') + '</div>' +
          '</div>' +
          '<div class="focus-meta">' +
            '<div>💤 Idle ' + timeAgo(agent.last_activity) + '</div>' +
          '</div>' +
        '</div>';
    }
  }

  function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    const statusOrder = { live: 0, in_progress: 1, planned: 2, paused: 3 };
    const sorted = [...(data.projects || [])].sort((a, b) =>
      (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9)
    );
    document.getElementById('projectCount').textContent = sorted.length;

    grid.innerHTML = sorted.map(p => {
      const isLive = p.status === 'live';
      const badgeClass = 'badge-' + (p.status || 'planned');
      const statusLabel = (p.status || 'planned').replace('_', ' ').toUpperCase();
      const healthDot = p.health
        ? '<span class="health-dot ' + esc(p.health) + '"></span>'
        : '';
      const ghIcon = p.repo
        ? '<a class="gh-link" href="https://github.com/' + esc(p.repo) + '" target="_blank" title="GitHub">⌂</a>'
        : '';
      const infraHtml = (p.infra || []).map(i =>
        '<span class="infra-pill">' + esc(i) + '</span>'
      ).join('');

      return '<div class="project-card' + (isLive ? ' live-border' : '') + '">' +
        '<div class="project-top">' +
          '<span class="project-name">' + healthDot + ' ' + esc(p.name) + '</span>' +
          '<span class="status-badge ' + badgeClass + '">' + statusLabel + '</span>' +
        '</div>' +
        '<span class="type-pill">' + esc(p.type || '—') + '</span>' +
        '<div class="project-phase">' + esc(p.phase || '—') + '</div>' +
        '<div class="project-next">→ ' + esc(p.next_action || '—') + '</div>' +
        '<div class="project-bottom">' +
          '<div class="infra-pills">' + infraHtml + '</div>' +
          '<span class="time-ago">' + timeAgo(p.last_activity) + '</span>' +
          ghIcon +
        '</div>' +
      '</div>';
    }).join('');
  }

  function renderInfra() {
    const grid = document.getElementById('infraGrid');
    const infra = data.infrastructure || [];
    document.getElementById('infraCount').textContent = infra.length;

    grid.innerHTML = infra.map(node => {
      const m = node.metrics || {};
      const healthClass = 'health-' + (node.status || 'healthy');
      const healthLabel = (node.status || 'healthy').toUpperCase();

      // Build metrics
      let metricsHtml = '';
      function addMetric(label, value, cls) {
        metricsHtml += '<div class="metric-item"><span class="metric-label">' + label + '</span><span class="metric-value ' + (cls||'') + '">' + value + '</span></div>';
      }

      if (m.last_log_minutes !== undefined) {
        const v = m.last_log_minutes;
        const cls = v <= 5 ? 'good' : v <= 15 ? 'warn' : 'bad';
        addMetric('Last Log', v + ' min', cls);
      }
      if (m.bankroll_usd !== undefined) {
        addMetric('Bankroll', '$' + m.bankroll_usd.toLocaleString(), 'good');
      }
      if (m.errors_24h !== undefined) {
        const cls = m.errors_24h === 0 ? 'good' : 'bad';
        addMetric('Errors 24h', m.errors_24h.toString(), cls);
      }
      if (m.uptime !== undefined) {
        addMetric('Uptime', m.uptime, '');
      }
      if (m.disk_pct !== undefined) {
        const cls = m.disk_pct < 80 ? '' : m.disk_pct < 90 ? 'warn' : 'bad';
        addMetric('Disk', m.disk_pct + '%', cls);
      }
      if (m.memory_pct !== undefined) {
        const cls = m.memory_pct < 80 ? '' : m.memory_pct < 90 ? 'warn' : 'bad';
        addMetric('Mem', m.memory_pct + '%', cls);
      }
      if (m.bot_script !== undefined) {
        addMetric('Script', m.bot_script, '');
      }
      if (m.screen_alive !== undefined) {
        const icon = m.screen_alive ? '✓' : '✗';
        const cls = m.screen_alive ? 'good' : 'bad';
        addMetric('Screen', icon, cls);
      }

      // Cities
      const citiesHtml = (node.cities || []).length > 0
        ? '<div class="cities-row">' + node.cities.map(c => '<span class="city-pill">' + esc(c) + '</span>').join('') + '</div>'
        : '';

      // Connected projects
      const projHtml = (node.projects || []).length > 0
        ? '<div class="infra-projects">Projects: ' + node.projects.map(id => '<a href="#" onclick="return false">' + esc(projectNameById(id)) + '</a>').join(', ') + '</div>'
        : '';

      return '<div class="infra-card">' +
        '<div class="infra-header">' +
          '<div><div class="infra-name">' + esc(node.name) + '</div><div class="infra-label">' + esc(node.label || '') + '</div></div>' +
          '<span class="health-badge ' + healthClass + '">' + healthLabel + '</span>' +
        '</div>' +
        '<div class="metrics-grid">' + metricsHtml + '</div>' +
        citiesHtml +
        projHtml +
      '</div>';
    }).join('');
  }

  function renderWork() {
    const items = data.work_items || [];
    const cols = { todo: [], in_progress: [], done: [] };
    items.forEach(w => {
      const bucket = cols[w.status] || cols.todo;
      bucket.push(w);
    });

    const colDefs = [
      { key: 'todo', label: 'TODO' },
      { key: 'in_progress', label: 'IN PROGRESS' },
      { key: 'done', label: 'DONE' }
    ];

    document.getElementById('workColumns').innerHTML = colDefs.map(col => {
      const list = cols[col.key] || [];
      return '<div class="work-column">' +
        '<div class="work-col-header"><span>' + col.label + '</span><span class="count-badge">' + list.length + '</span></div>' +
        list.map(w => {
          const isDone = w.status === 'done';
          const assigneeClass = 'pill-' + (w.assignee || 'scv');
          const assigneeLabel = (w.assignee || 'scv').toUpperCase();
          return '<div class="work-item' + (isDone ? ' done-item' : '') + '">' +
            '<div class="work-desc">' + esc(w.description) + '</div>' +
            '<div class="work-pills">' +
              (w.project ? '<span class="work-pill pill-project">' + esc(projectNameById(w.project)) + '</span>' : '') +
              '<span class="work-pill ' + assigneeClass + '">' + assigneeLabel + '</span>' +
            '</div>' +
            '<div class="work-date">' + formatDateCT(w.created) + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
    }).join('');
  }

  function renderCron() {
    const jobs = data.cron_jobs || [];
    document.getElementById('cronCount').textContent = jobs.length;
    document.getElementById('cronBody').innerHTML = jobs.map(j => {
      const statusCls = j.status === 'ok' ? 'cron-status-ok' : 'cron-status-error';
      return '<tr>' +
        '<td class="cron-name">' + esc(j.name) + '</td>' +
        '<td>' + esc(projectNameById(j.project)) + '</td>' +
        '<td>' + esc(j.schedule) + '</td>' +
        '<td>' + formatDateCT(j.last_run) + '</td>' +
        '<td class="' + statusCls + '">' + (j.status || '—').toUpperCase() + '</td>' +
        '<td>' + formatDateCT(j.next_run) + '</td>' +
      '</tr>';
    }).join('');
  }

  function renderLogFilters() {
    const projects = data.projects || [];
    const container = document.getElementById('logFilters');
    let html = '<button class="log-filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" data-filter="all">All</button>';
    projects.forEach(p => {
      html += '<button class="log-filter-btn' + (activeFilter === p.id ? ' active' : '') + '" data-filter="' + esc(p.id) + '">' + esc(p.name) + '</button>';
    });
    // Also add "No Project" for null project entries
    html += '<button class="log-filter-btn' + (activeFilter === '__none__' ? ' active' : '') + '" data-filter="__none__">General</button>';
    container.innerHTML = html;

    container.querySelectorAll('.log-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter;
        renderLogFilters();
        renderLog();
      });
    });
  }

  function renderLog() {
    const log = data.activity_log || [];
    const container = document.getElementById('logContainer');

    const filtered = activeFilter === 'all'
      ? log
      : activeFilter === '__none__'
        ? log.filter(e => !e.project)
        : log.filter(e => e.project === activeFilter);

    container.innerHTML = filtered.map(entry => {
      const sevClass = entry.severity === 'warning' ? ' severity-warning' : '';
      return '<div class="log-entry">' +
        '<span class="log-time">' + formatTimeCT(entry.timestamp) + '</span>' +
        '<span class="log-type-dot log-type-' + esc(entry.type) + '"></span>' +
        (entry.project ? '<span class="log-project-tag">' + esc(projectNameById(entry.project)) + '</span>' : '<span class="log-project-tag">General</span>') +
        '<span class="log-msg' + sevClass + '">' + esc(entry.message) + '</span>' +
      '</div>';
    }).join('');
  }

  // === INIT ===
  fetchData();
  setInterval(fetchData, 10000);
})();
</script>
</body>
</html>
